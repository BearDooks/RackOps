{% extends "base.html" %}

{% block title %}Dashboard - RackOps{% endblock %}

{% block content %}
<div class="px-4 py-6 sm:px-0">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-gray-900 dark:text-white">Dashboard</h1>
        <button onclick="openSiteModal()"
            class="operator-only hidden bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg shadow-md transition-all">
            + New Site
        </button>


    </div>

    <!-- Global Stats -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 items-start">
        <!-- Total Sites Card -->
        <div
            class="glass-panel rounded-xl p-6 shadow-sm border-l-4 border-blue-500 flex items-center justify-between transition-transform transform ">
            <div>
                <h3 class="text-gray-500 dark:text-gray-400 text-sm font-semibold uppercase tracking-wider mb-1">
                    Total Sites</h3>
                <p id="global-sites-count" class="text-4xl font-extrabold text-gray-900 dark:text-white">0</p>
            </div>
            <div class="p-3 bg-blue-100 dark:bg-blue-900/30 rounded-2xl shadow-inner">
                <svg class="w-8 h-8 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4">
                    </path>
                </svg>
            </div>
        </div>

        <!-- Total Racks Card -->
        <div
            class="glass-panel rounded-xl p-6 shadow-sm border-l-4 border-green-500 flex items-center justify-between transition-transform transform ">
            <div>
                <h3 class="text-gray-500 dark:text-gray-400 text-sm font-semibold uppercase tracking-wider mb-1">
                    Total Racks</h3>
                <p id="global-racks-count" class="text-4xl font-extrabold text-gray-900 dark:text-white">0</p>
            </div>
            <div class="p-3 bg-green-100 dark:bg-green-900/30 rounded-2xl shadow-inner">
                <svg class="w-8 h-8 text-green-600 dark:text-green-400" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 6a2 2 0 012-2h12a2 2 0 012 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2V6z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 10h16M4 14h16M8 6v12M16 6v12"></path>
                </svg>
            </div>
        </div>

        <!-- Total Devices Card -->
        <div
            class="glass-panel rounded-xl p-6 shadow-sm border-l-4 border-purple-500 flex items-center justify-between transition-transform transform ">
            <div>
                <h3 class="text-gray-500 dark:text-gray-400 text-sm font-semibold uppercase tracking-wider mb-1">
                    Total Devices</h3>
                <p id="global-devices-count" class="text-4xl font-extrabold text-gray-900 dark:text-white">0</p>
            </div>
            <div class="p-3 bg-purple-100 dark:bg-purple-900/30 rounded-2xl shadow-inner">
                <svg class="w-8 h-8 text-purple-600 dark:text-purple-400" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M5 12h14M5 12a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v4a2 2 0 01-2 2M5 12a2 2 0 00-2 2v4a2 2 0 002 2h14a2 2 0 002-2v-4a2 2 0 00-2-2m-2-4h.01M17 16h.01">
                    </path>
                </svg>
            </div>
        </div>
    </div>

    <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-4">Sites Overview</h2>

    <!-- Sites Grid -->
    <div id="sites-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <!-- Sites will be populated here by JS -->
    </div>
</div>

<!-- Create Site Modal -->
<div id="createSiteModal" class="fixed z-50 inset-0 overflow-y-auto hidden" aria-labelledby="modal-title" role="dialog"
    aria-modal="true">
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"
            onclick="closeSiteModal()"></div>
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
        <div
            class="inline-block align-bottom bg-white dark:bg-gray-800 rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full glass-panel">
            <div class="px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                <div class="sm:flex sm:items-start">
                    <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left w-full">
                        <h3 class="text-lg leading-6 font-medium text-gray-900 dark:text-white" id="modal-title">Create
                            New Site</h3>
                        <div class="mt-2 space-y-4">
                            <div>
                                <label for="site-name"
                                    class="block text-sm font-medium text-gray-700 dark:text-gray-300">Name</label>
                                <input type="text" name="name" id="site-name"
                                    class="mt-1 focus:ring-blue-500 focus:border-blue-500 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md p-2 glass-input dark:text-white"
                                    placeholder="Site Name">
                            </div>
                            <div>
                                <label for="site-desc"
                                    class="block text-sm font-medium text-gray-700 dark:text-gray-300">Description</label>
                                <textarea name="description" id="site-desc" rows="3"
                                    class="mt-1 focus:ring-blue-500 focus:border-blue-500 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md p-2 glass-input dark:text-white"
                                    placeholder="Optional description"></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div
                class="bg-gray-50 dark:bg-gray-700/50 px-4 py-3 sm:px-6 flex justify-between items-center sm:flex-row-reverse">
                <div class="flex gap-2">
                    <button type="button" id="site-save-btn" onclick="saveSite()"
                        class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:w-auto sm:text-sm">
                        Save
                    </button>
                    <button type="button" onclick="closeSiteModal()"
                        class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:w-auto sm:text-sm dark:bg-gray-600 dark:text-gray-200 dark:border-gray-500 dark:hover:bg-gray-500">
                        Cancel
                    </button>
                </div>
                <div>
                    <button type="button" id="site-delete-btn" onclick="deleteSite()"
                        class="operator-only hidden inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-red-600 text-base font-medium text-white hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 sm:w-auto sm:text-sm">
                        Delete
                    </button>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function fetchSites() {
        const grid = document.getElementById('sites-grid');

        // Show Skeleton Loaders
        grid.innerHTML = Array(3).fill(`
<div class="glass-panel rounded-xl p-6 shadow-lg block">
    <div class="flex justify-between items-start mb-4">
        <div class="w-2/3">
            <div class="h-6 skeleton rounded w-3/4 mb-2"></div>
            <div class="h-4 skeleton rounded w-full"></div>
        </div>
    </div>
    <div class="mt-4 mb-4 grid grid-cols-3 gap-4 border-t border-b border-gray-200 dark:border-gray-700 py-4">
        <div class="h-10 skeleton rounded w-full"></div>
        <div class="h-10 skeleton rounded w-full"></div>
        <div class="h-10 skeleton rounded w-full"></div>
    </div>
    <div class="flex justify-end mt-4">
        <div class="h-4 skeleton rounded w-24"></div>
    </div>
</div>
`).join('');

        const response = await apiFetch('/api/sites/');
        const sites = response ? await response.json() : [];

        grid.innerHTML = '';


        if (sites.length === 0) {
            grid.innerHTML = `
<div class="col-span-1 md:col-span-2 lg:col-span-3 text-center py-12 glass-panel rounded-xl">
    <svg class="mx-auto h-24 w-24 text-gray-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
        </path>
    </svg>
    <h3 class="text-xl font-medium text-gray-900 dark:text-white">No Sites Found</h3>
    <p class="mt-1 text-gray-500 dark:text-gray-400 mb-6">Get started by creating your first data center site.</p>
    <button onclick="openSiteModal()"
        class="inline-flex items-center px-6 py-3 border border-transparent shadow-lg text-base font-medium rounded-lg text-white bg-blue-600 hover:bg-blue-700 transition-colors">
        + Create New Site
    </button>

</div>
`;
            document.getElementById('global-sites-count').textContent = '0';
            document.getElementById('global-racks-count').textContent = '0';
            document.getElementById('global-devices-count').textContent = '0';
            renderChart(0, 0);
            return;
        }

        let globalSites = sites.length;
        let globalRacks = 0;
        let globalDevices = 0;
        let globalTotalUnits = 0;
        let globalUsedUnits = 0;

        sites.forEach(site => {
            const card = document.createElement('div');
            card.className = 'glass-panel rounded-xl p-6 shadow-lg hover:shadow-xl transition-shadow cursor-pointer block';

            // Header: Name and ID
            const headerDiv = document.createElement('div');
            headerDiv.className = 'flex justify-between items-start';

            const infoDiv = document.createElement('div');
            const titleRow = document.createElement('div');
            titleRow.className = 'flex items-center gap-2 mb-2';

            const h2 = document.createElement('h2');
            h2.className = 'text-xl font-bold text-gray-900 dark:text-white';
            h2.textContent = site.name;

            const editDeleteButtons = document.createElement('div');
            editDeleteButtons.className = 'flex gap-2 operator-only hidden';

            const editBtn = document.createElement('button');
            editBtn.innerHTML = `
<svg class="w-5 h-5 text-gray-500 hover:text-blue-600 dark:hover:text-blue-400 transition-colors" fill="none"
    stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path>
</svg>
`;
            editBtn.className = 'p-1 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded';
            editBtn.onclick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                openSiteModal(site);
            };
            editDeleteButtons.appendChild(editBtn);

            titleRow.appendChild(h2);
            titleRow.appendChild(editDeleteButtons);


            const p = document.createElement('p');
            p.className = 'text-gray-600 dark:text-gray-300 text-sm mb-4';
            p.textContent = site.description || 'No description';

            infoDiv.appendChild(titleRow);
            infoDiv.appendChild(p);

            const idSpan = document.createElement('span');
            idSpan.className = 'bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded dark:bg-blue-200 dark:text-blue-800';
            idSpan.textContent = `ID: ${site.id}`;

            headerDiv.appendChild(infoDiv);
            headerDiv.appendChild(idSpan);

            // Stats section
            const statsDiv = document.createElement('div');
            statsDiv.className = 'mt-4 mb-4 grid grid-cols-3 gap-4 border-t border-b border-gray-200 dark:border-gray-700 py-4';

            const rackCount = site.racks ? site.racks.length : 0;
            globalRacks += rackCount;

            let totalUnits = 0;
            let usedUnits = 0;

            if (site.racks) {
                site.racks.forEach(rack => {
                    totalUnits += rack.total_units;
                    globalTotalUnits += rack.total_units;
                    if (rack.devices) {
                        globalDevices += rack.devices.length;
                        rack.devices.forEach(device => {
                            const uCount = (device.end_u - device.start_u + 1);
                            usedUnits += uCount;
                            globalUsedUnits += uCount;
                        });
                    }
                });
            }

            const fullness = totalUnits > 0 ? Math.round((usedUnits / totalUnits) * 100) : 0;
            const openUnits = totalUnits - usedUnits;

            const rackStatDiv = document.createElement('div');
            rackStatDiv.innerHTML = `<span class="block text-sm text-gray-500 dark:text-gray-400">Total Racks</span><span
    class="text-lg font-semibold text-gray-900 dark:text-white">${rackCount}</span>`;

            const openStatDiv = document.createElement('div');
            openStatDiv.innerHTML = `<span class="block text-sm text-gray-500 dark:text-gray-400">Open U</span><span
    class="text-lg font-semibold text-gray-900 dark:text-white">${openUnits}</span>`;

            const fullStatDiv = document.createElement('div');
            fullStatDiv.innerHTML = `<span class="block text-sm text-gray-500 dark:text-gray-400">Capacity Used</span>
<div class="flex items-center"><span
        class="text-lg font-semibold text-gray-900 dark:text-white mr-2">${fullness}%</span>
    <div class="w-full bg-gray-200 rounded-full h-2.5 dark:bg-gray-700">
        <div class="bg-blue-600 h-2.5 rounded-full" style="width: ${fullness}%"></div>
    </div>
</div>`;

            statsDiv.appendChild(rackStatDiv);
            statsDiv.appendChild(openStatDiv);
            statsDiv.appendChild(fullStatDiv);

            // Footer: Link
            const footerDiv = document.createElement('div');
            footerDiv.className = 'mt-4 flex justify-end';

            const link = document.createElement('a');
            link.href = `/sites/${site.id}`;
            link.className = 'text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300 font-medium';
            link.textContent = 'View Racks \u2192'; // Right arrow

            footerDiv.appendChild(link);

            card.appendChild(headerDiv);
            card.appendChild(statsDiv);
            card.appendChild(footerDiv);

            // Make the whole card clickable, but prevent infinite loop if clicking a link
            card.onclick = (e) => {
                // If the target is NOT an anchor tag, redirect.
                if (!e.target.closest('a')) {
                    window.location.href = `/sites/${site.id}`;
                }
            };
            grid.appendChild(card);
        });

        // Update global stats
        document.getElementById('global-sites-count').textContent = globalSites;
        document.getElementById('global-racks-count').textContent = globalRacks;
        document.getElementById('global-devices-count').textContent = globalDevices;

        if (typeof updateUIPermissions === 'function') updateUIPermissions();
    }


    let editingSiteId = null;

    function openSiteModal(site = null) {
        editingSiteId = site ? site.id : null;
        document.getElementById('modal-title').textContent = site ? 'Edit Site' : 'Create New Site';
        document.getElementById('site-name').value = site ? site.name : '';
        document.getElementById('site-desc').value = site ? (site.description || '') : '';
        document.getElementById('site-save-btn').textContent = site ? 'Save Changes' : 'Create';

        const deleteBtn = document.getElementById('site-delete-btn');
        if (site) {
            deleteBtn.classList.remove('hidden');
        } else {
            deleteBtn.classList.add('hidden');
        }

        document.getElementById('createSiteModal').classList.remove('hidden');
    }

    function closeSiteModal() {
        document.getElementById('createSiteModal').classList.add('hidden');
        document.getElementById('site-name').value = '';
        document.getElementById('site-desc').value = '';
        editingSiteId = null;
    }

    async function saveSite() {
        const name = document.getElementById('site-name').value;
        const description = document.getElementById('site-desc').value;

        if (!name) {
            showToast('Name is required', 'error');
            return;
        }

        const url = editingSiteId ? `/api/sites/${editingSiteId}` : '/api/sites/';
        const method = editingSiteId ? 'PUT' : 'POST';

        const response = await apiFetch(url, {
            method: method,
            body: JSON.stringify({ name, description }),
        });


        if (response && response.ok) {
            closeSiteModal();
            fetchSites();
            showToast(editingSiteId ? 'Site updated successfully' : 'Site created successfully', 'success');
        } else {
            showToast('Failed to save site', 'error');
        }
    }

    async function deleteSite() {
        if (!editingSiteId) return;
        if (!confirm('Are you sure you want to delete this site? All racks and devices inside it will be orphaned or deleted.'))
            return;

        const response = await apiFetch(`/api/sites/${editingSiteId}`, {
            method: 'DELETE'
        });


        if (response && response.ok) {
            closeSiteModal();
            fetchSites();
            showToast('Site deleted successfully', 'success');
        } else {
            showToast('Failed to delete site', 'error');
        }
    }

    // Initial load
    fetchSites();
</script>
{% endblock %}
