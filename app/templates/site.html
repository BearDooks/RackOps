{% extends "base.html" %}

{% block title %}Site {{ site_id }} - RackOps{% endblock %}

{% block content %}
<div class="px-4 py-6 sm:px-0">
    <nav class="mb-4 text-sm font-medium text-gray-500 dark:text-gray-400">
        <a href="/" class="hover:text-blue-600 dark:hover:text-blue-400 transition-colors">Home</a>
        <span class="mx-2">/</span>
        <span class="text-gray-900 dark:text-gray-100" id="breadcrumb-site-name">Loading...</span>
    </nav>
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 id="site-title" class="text-3xl font-bold text-gray-900 dark:text-white">Site Details</h1>
            <p id="site-desc" class="text-gray-600 dark:text-gray-300"></p>
        </div>
        <div class="flex gap-4 items-center">
            <input type="text" id="rack-search" placeholder="Search racks..."
                class="block w-full pl-3 pr-3 py-2 border border-gray-300 dark:border-gray-600 rounded-md leading-5 bg-white dark:bg-gray-800 text-gray-900 dark:text-white placeholder-gray-500 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 sm:text-sm glass-input transition-all w-48 focus:w-64"
                onkeyup="filterRacks()">
            <button onclick="openRackModal()"
                class="operator-only hidden bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg shadow-md transition-all whitespace-nowrap">
                + New Rack
            </button>


        </div>
    </div>

    <!-- Racks Grid -->
    <div id="racks-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <!-- Racks populated by JS -->
    </div>
</div>

<!-- Create Rack Modal -->
<div id="createRackModal" class="fixed z-50 inset-0 overflow-y-auto hidden" aria-labelledby="modal-title" role="dialog"
    aria-modal="true">
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"
            onclick="closeRackModal()"></div>
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
        <div
            class="inline-block align-bottom bg-white dark:bg-gray-800 rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full glass-panel">
            <div class="px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                <div class="sm:flex sm:items-start">
                    <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left w-full">
                        <h3 class="text-lg leading-6 font-medium text-gray-900 dark:text-white" id="modal-title">Create
                            New Rack</h3>
                        <div class="mt-2 space-y-4">
                            <div>
                                <label for="rack-row"
                                    class="block text-sm font-medium text-gray-700 dark:text-gray-300">Row</label>
                                <input type="text" id="rack-row"
                                    class="mt-1 focus:ring-blue-500 focus:border-blue-500 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md p-2 glass-input dark:text-white"
                                    placeholder="Row (e.g., A)">
                            </div>
                            <div>
                                <label for="rack-number"
                                    class="block text-sm font-medium text-gray-700 dark:text-gray-300">Number</label>
                                <input type="text" id="rack-number"
                                    class="mt-1 focus:ring-blue-500 focus:border-blue-500 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md p-2 glass-input dark:text-white"
                                    placeholder="Number (e.g., 01)">
                            </div>
                            <div>
                                <label for="rack-units"
                                    class="block text-sm font-medium text-gray-700 dark:text-gray-300">Total
                                    Units</label>
                                <input type="number" id="rack-units" value="42"
                                    class="mt-1 focus:ring-blue-500 focus:border-blue-500 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md p-2 glass-input dark:text-white">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div
                class="bg-gray-50 dark:bg-gray-700/50 px-4 py-3 sm:px-6 flex justify-between items-center sm:flex-row-reverse">
                <div class="flex gap-2">
                    <button type="button" id="rack-save-btn" onclick="saveRack()"
                        class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 sm:w-auto sm:text-sm">
                        Create
                    </button>
                    <button type="button" onclick="closeRackModal()"
                        class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 sm:mt-0 sm:w-auto sm:text-sm dark:bg-gray-600 dark:text-gray-200 dark:border-gray-500 dark:hover:bg-gray-500">
                        Cancel
                    </button>
                </div>
                <div>
                    <button type="button" id="rack-delete-btn" onclick="deleteRack()"
                        class="hidden inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-red-600 text-base font-medium text-white hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 sm:w-auto sm:text-sm">
                        Delete
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const siteId = "{{ site_id }}";

    async function fetchSite() {
        const response = await apiFetch(`/api/sites/${siteId}`);
        const site = response ? await response.json() : { name: 'Error', description: '' };

        document.getElementById('site-title').textContent = site.name;
        document.getElementById('breadcrumb-site-name').textContent = site.name;
        document.getElementById('site-desc').textContent = site.description || '';
    }

    window.allRacksCache = [];

    async function fetchRacks() {
        const grid = document.getElementById('racks-grid');
        grid.innerHTML = Array(4).fill(`
            <div class="glass-panel rounded-xl p-6 shadow-lg block">
                <div class="text-center">
                    <div class="flex justify-center items-center gap-2 mb-2">
                        <div class="h-8 skeleton rounded w-16"></div>
                    </div>
                    <div class="h-4 skeleton rounded w-24 mx-auto mb-4"></div>
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <div class="h-10 skeleton rounded w-full"></div>
                        <div class="h-10 skeleton rounded w-full"></div>
                    </div>
                    <div class="mt-4 flex justify-center">
                        <div class="h-8 skeleton rounded-full w-32"></div>
                    </div>
                </div>
            </div>
        `).join('');

        const response = await apiFetch(`/api/racks/?site_id=${siteId}`);
        const racks = response ? await response.json() : [];

        window.allRacksCache = racks;
        renderRacks(racks);
    }

    function filterRacks() {
        const query = document.getElementById('rack-search').value.toLowerCase();
        const filtered = window.allRacksCache.filter(rack =>
            `${rack.row}-${rack.number}`.toLowerCase().includes(query)
        );
        renderRacks(filtered);
    }

    function renderRacks(racks) {
        const grid = document.getElementById('racks-grid');
        grid.innerHTML = '';

        let totalRacks = window.allRacksCache.length;
        let totalDevices = 0;

        window.allRacksCache.forEach(rack => {
            if (rack.devices) {
                totalDevices += rack.devices.length;
            }
        });

        // Add stats under site description
        const siteDesc = document.getElementById('site-desc');
        let statsDiv = document.getElementById('site-stats');

        if (!statsDiv) {
            statsDiv = document.createElement('div');
            statsDiv.id = 'site-stats';
            statsDiv.className = 'mt-3 flex gap-4 text-sm font-medium';
            siteDesc.parentNode.insertBefore(statsDiv, siteDesc.nextSibling);
        }

        statsDiv.innerHTML = `
            <span class="bg-blue-100 text-blue-800 dark:bg-blue-900/50 dark:text-blue-200 px-3 py-1 rounded-full shadow-sm">${totalRacks} Racks</span>
            <span class="bg-green-100 text-green-800 dark:bg-green-900/50 dark:text-green-200 px-3 py-1 rounded-full shadow-sm">${totalDevices} Devices</span>
        `;

        if (racks.length === 0) {
            if (window.allRacksCache.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-1 md:col-span-2 lg:col-span-4 text-center py-12 glass-panel rounded-xl">
                        <svg class="mx-auto h-24 w-24 text-gray-400 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path>
                        </svg>
                        <h3 class="text-xl font-medium text-gray-900 dark:text-white">No Racks Found</h3>
                        <p class="mt-1 text-gray-500 dark:text-gray-400 mb-6">Start by adding a rack to this site.</p>
                        <button onclick="openRackModal()" class="operator-only hidden inline-flex items-center px-6 py-3 border border-transparent shadow-lg text-base font-medium rounded-lg text-white bg-blue-600 hover:bg-blue-700 transition-colors">
                            + Create New Rack
                        </button>


                    </div>
                `;
            } else {
                grid.innerHTML = '<p class="text-gray-500 dark:text-gray-400 col-span-1 md:col-span-2 lg:col-span-4 text-center py-8">No racks match your search.</p>';
            }
            return;
        }

        racks.forEach(rack => {
            const card = document.createElement('div');
            card.className = 'glass-panel rounded-xl p-6 shadow-lg hover:shadow-xl transition-shadow cursor-pointer block';

            const div = document.createElement('div');
            div.className = 'text-center';

            const titleRow = document.createElement('div');
            titleRow.className = 'flex justify-center items-center gap-2 mb-2';

            const h2 = document.createElement('h2');
            h2.className = 'text-4xl font-bold text-gray-900 dark:text-white';
            h2.textContent = `${rack.row}-${rack.number}`;

            const editBtn = document.createElement('button');
            editBtn.innerHTML = `
                <svg class="w-5 h-5 text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path>
                </svg>
            `;
            editBtn.className = 'operator-only hidden p-1 focus:outline-none focus:ring-2 focus:ring-blue-500 rounded';
            editBtn.onclick = (e) => {
                e.preventDefault();
                e.stopPropagation();
                openRackModal(rack);
            };

            titleRow.appendChild(h2);
            titleRow.appendChild(editBtn);

            const p = document.createElement('p');
            p.className = 'text-gray-500 dark:text-gray-300 text-sm mb-4';
            p.textContent = `${rack.total_units} Units Total`;

            let usedUnits = 0;
            if (rack.devices && rack.devices.length > 0) {
                rack.devices.forEach(device => {
                    usedUnits += (device.end_u - device.start_u + 1);
                });
            }
            const openUnits = rack.total_units - usedUnits;

            const statsGrid = document.createElement('div');
            statsGrid.className = 'grid grid-cols-2 gap-2 mb-4 text-sm bg-gray-50 dark:bg-gray-800/50 rounded-lg p-2';

            const usedDiv = document.createElement('div');
            usedDiv.innerHTML = `<span class="block text-gray-500 dark:text-gray-400">Used</span><span class="font-semibold text-gray-900 dark:text-gray-100">${usedUnits} U</span>`;

            const openDiv = document.createElement('div');
            openDiv.innerHTML = `<span class="block text-gray-500 dark:text-gray-400">Open</span><span class="font-semibold text-green-600 dark:text-green-400">${openUnits} U</span>`;

            statsGrid.appendChild(usedDiv);
            statsGrid.appendChild(openDiv);

            const linkDiv = document.createElement('div');
            linkDiv.className = 'mt-4';

            const link = document.createElement('a');
            link.href = `/racks/${rack.id}`;
            link.className = 'inline-block bg-blue-100 dark:bg-blue-900/50 text-blue-800 dark:text-blue-200 px-4 py-2 rounded-full text-sm font-semibold hover:bg-blue-200 dark:hover:bg-blue-800 transition-colors';
            link.textContent = 'View Elevation';

            linkDiv.appendChild(link);
            div.appendChild(titleRow);
            div.appendChild(p);
            div.appendChild(statsGrid);
            div.appendChild(linkDiv);
            card.appendChild(div);

            card.onclick = (e) => {
                if (e.target.tagName !== 'A' && e.target.tagName !== 'BUTTON' && !e.target.closest('button')) {
                    window.location.href = `/racks/${rack.id}`;
                }
            };
            grid.appendChild(card);
        });
        if (typeof updateUIPermissions === 'function') updateUIPermissions();
    }

    let editingRackId = null;

    function openRackModal(rack = null) {
        editingRackId = rack ? rack.id : null;
        document.getElementById('modal-title').textContent = rack ? 'Edit Rack' : 'Create New Rack';
        document.getElementById('rack-row').value = rack ? rack.row : '';
        document.getElementById('rack-number').value = rack ? rack.number : '';
        document.getElementById('rack-units').value = rack ? rack.total_units : 42;
        document.getElementById('rack-save-btn').textContent = rack ? 'Save Changes' : 'Create';

        const deleteBtn = document.getElementById('rack-delete-btn');
        if (rack) {
            deleteBtn.classList.remove('hidden');
        } else {
            deleteBtn.classList.add('hidden');
        }

        document.getElementById('createRackModal').classList.remove('hidden');
    }

    function closeRackModal() {
        document.getElementById('createRackModal').classList.add('hidden');
        document.getElementById('rack-row').value = '';
        document.getElementById('rack-number').value = '';
        document.getElementById('rack-units').value = 42;
        editingRackId = null;
        if (typeof updateUIPermissions === 'function') updateUIPermissions();
    }

    async function saveRack() {
        const row = document.getElementById('rack-row').value;
        const number = document.getElementById('rack-number').value;
        const total_units = document.getElementById('rack-units').value;

        if (!row || !number) {
            showToast('Row and Number are required', 'error');
            return;
        }

        const url = editingRackId ? `/api/racks/${editingRackId}` : '/api/racks/';
        const method = editingRackId ? 'PUT' : 'POST';
        const successMsg = editingRackId ? 'Rack updated successfully' : 'Rack created successfully';

        const response = await apiFetch(url, {
            method: method,
            body: JSON.stringify({ site_id: siteId, row, number, total_units: parseInt(total_units) })
        });


        if (response && response.ok) {
            closeRackModal();
            fetchRacks();
            showToast(successMsg, 'success');
        } else if (response) {
            const errorData = await response.json().catch(() => ({ detail: "Failed to save rack." }));
            showToast(errorData.detail || 'Failed to save rack', 'error');
        } else {
            showToast('Failed to save rack', 'error');
        }
    }

    async function deleteRack() {
        if (!editingRackId) return;
        if (!confirm('Are you sure you want to delete this rack? All devices inside it will be orphaned or deleted.')) return;

        const response = await apiFetch(`/api/racks/${editingRackId}`, {
            method: 'DELETE'
        });


        if (response.ok) {
            closeRackModal();
            fetchRacks();
            showToast('Rack deleted successfully', 'success');
        } else {
            showToast('Failed to delete rack', 'error');
        }
    }

    fetchSite();
    fetchRacks();
</script>
{% endblock %}
