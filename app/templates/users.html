{% extends "base.html" %}

{% block title %}User Management - RackOps{% endblock %}

{% block content %}
<div class="max-content mx-auto px-4 py-8">
    <div class="flex justify-between items-center mb-8">
        <h1
            class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400 bg-clip-text text-transparent">
            User Management
        </h1>
        <button onclick="openAddUserModal()"
            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center transition-all shadow-lg hover:shadow-blue-500/20">
            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6">
                </path>
            </svg>
            Add User
        </button>
    </div>

    <!-- Users Table -->
    <div
        class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-md rounded-2xl shadow-xl overflow-hidden border border-white/20 dark:border-gray-700/30">
        <table class="w-full text-left">
            <thead class="bg-gray-50/50 dark:bg-gray-900/50 border-b border-gray-200 dark:border-gray-700">
                <tr>
                    <th
                        class="px-6 py-4 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                        Username</th>
                    <th
                        class="px-6 py-4 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                        Role</th>
                    <th
                        class="px-6 py-4 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider">
                        Status</th>
                    <th
                        class="px-6 py-4 text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wider text-right">
                        Actions</th>
                </tr>
            </thead>
            <tbody id="users-table-body" class="divide-y divide-gray-100 dark:divide-gray-700">
                <!-- Users will be loaded here -->
            </tbody>
        </table>
    </div>
</div>

<!-- Add/Edit User Modal -->
<div id="user-modal"
    class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
    <div
        class="bg-white dark:bg-gray-800 rounded-2xl max-w-md w-full p-8 shadow-2xl border border-white/20 dark:border-gray-700/30 transform transition-all">
        <h2 id="modal-title" class="text-2xl font-bold mb-6 text-gray-900 dark:text-white">Add New User</h2>
        <form id="user-form" onsubmit="handleUserSubmit(event)">
            <input type="hidden" id="user-id">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Username</label>
                    <input type="text" id="username" required
                        class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div id="password-group">
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Password</label>
                    <input type="password" id="password" required
                        class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Role</label>
                    <select id="role"
                        class="w-full px-4 py-2 rounded-lg border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-900 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                        <option value="Viewer">Viewer</option>
                        <option value="Operator">Operator</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <div class="flex items-center">
                    <input type="checkbox" id="is_active" checked
                        class="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500">
                    <label for="is_active" class="ml-2 text-sm text-gray-700 dark:text-gray-300">Active</label>
                </div>
            </div>
            <div class="flex justify-end gap-4 mt-8">
                <button type="button" onclick="closeUserModal()"
                    class="px-4 py-2 text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors">Cancel</button>
                <button type="submit"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-medium transition-all shadow-lg hover:shadow-blue-500/20">
                    Save User
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    async function fetchUsers() {
        try {
            const response = await apiFetch('/api/users/');
            const users = await response.json();
            renderUsers(users);
        } catch (error) {
            console.error('Error fetching users:', error);
            showToast('Error loading users', 'error');
        }
    }

    function renderUsers(users) {
        const tbody = document.getElementById('users-table-body');
        tbody.innerHTML = users.map(user => `
            <tr class="hover:bg-gray-50/50 dark:hover:bg-gray-900/50 transition-colors">
                <td class="px-6 py-4 font-medium">${user.username}</td>
                <td class="px-6 py-4">
                    <span class="px-2.5 py-1 rounded-full text-xs font-medium ${getRoleColor(user.role)}">
                        ${user.role}
                    </span>
                </td>
                <td class="px-6 py-4">
                    <span class="flex items-center text-sm ${user.is_active ? 'text-green-600' : 'text-red-600'}">
                        <span class="w-2 h-2 rounded-full mr-2 ${user.is_active ? 'bg-green-600' : 'bg-red-600'}"></span>
                        ${user.is_active ? 'Active' : 'Inactive'}
                    </span>
                </td>
                <td class="px-6 py-4 text-right space-x-2">
                    <button onclick='editUser(${JSON.stringify(user)})' class="p-2 text-gray-400 hover:text-blue-600 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    </button>
                    ${user.username !== 'admin' ? `
                    <button onclick="deleteUser(${user.id})" class="p-2 text-gray-400 hover:text-red-600 transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                    ` : ''}
                </td>
            </tr>
        `).join('');
    }

    function getRoleColor(role) {
        switch (role) {
            case 'Admin': return 'bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-400';
            case 'Operator': return 'bg-blue-100 text-blue-700 dark:bg-blue-900/30 dark:text-blue-400';
            default: return 'bg-gray-100 text-gray-700 dark:bg-gray-900/30 dark:text-gray-400';
        }
    }

    function openAddUserModal() {
        document.getElementById('modal-title').textContent = 'Add New User';
        document.getElementById('user-form').reset();
        document.getElementById('user-id').value = '';
        document.getElementById('username').disabled = false;
        document.getElementById('password-group').classList.remove('hidden');
        document.getElementById('password').required = true;
        document.getElementById('user-modal').classList.remove('hidden');
    }

    function editUser(user) {
        document.getElementById('modal-title').textContent = 'Edit User';
        document.getElementById('user-id').value = user.id;
        document.getElementById('username').value = user.username;
        document.getElementById('username').disabled = true;
        document.getElementById('role').value = user.role;
        document.getElementById('is_active').checked = user.is_active;
        document.getElementById('password-group').classList.add('hidden');
        document.getElementById('password').required = false;
        document.getElementById('user-modal').classList.remove('hidden');
    }

    function closeUserModal() {
        document.getElementById('user-modal').classList.add('hidden');
    }

    async function handleUserSubmit(e) {
        e.preventDefault();
        const userId = document.getElementById('user-id').value;
        const data = {
            username: document.getElementById('username').value,
            role: document.getElementById('role').value,
            is_active: document.getElementById('is_active').checked
        };

        if (!userId) {
            data.password = document.getElementById('password').value;
        }

        const url = userId ? `/api/users/${userId}` : '/api/users/';
        const method = userId ? 'PUT' : 'POST';

        try {
            const response = await apiFetch(url, {
                method,
                body: JSON.stringify(data)
            });

            if (response && response.ok) {
                showToast(`User ${userId ? 'updated' : 'created'} successfully`, 'success');
                closeUserModal();
                fetchUsers();
            } else {
                const err = await response.json();
                showToast(err.detail || 'Action failed', 'error');
            }
        } catch (error) {
            showToast('Network error', 'error');
        }
    }

    async function deleteUser(userId) {
        if (!confirm('Are you sure you want to delete this user?')) return;
        try {
            const response = await apiFetch(`/api/users/${userId}`, { method: 'DELETE' });
            if (response.ok) {
                showToast('User deleted successfully', 'success');
                fetchUsers();
            }
        } catch (error) {
            showToast('Delete failed', 'error');
        }
    }

    window.onload = fetchUsers;
</script>
{% endblock %}
